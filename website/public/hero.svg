<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 540" width="540" height="540" fill="none">
  <defs>
    <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECCF57"/>
      <stop offset="100%" stop-color="#C9A100"/>
    </linearGradient>
    <linearGradient id="gTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF9E6"/>
      <stop offset="100%" stop-color="#ECCF57"/>
    </linearGradient>
    <linearGradient id="gCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E388"/>
      <stop offset="100%" stop-color="#C9A100"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 连接线（中心 → 四个节点） -->
  <g stroke="#C9A100" stroke-width="2" opacity="0.55" stroke-linecap="round">
    <line x1="270" y1="270" x2="120" y2="120" stroke-dasharray="5 6"/>
    <line x1="270" y1="270" x2="420" y2="120" stroke-dasharray="5 6"/>
    <line x1="270" y1="270" x2="120" y2="420" stroke-dasharray="5 6"/>
    <line x1="270" y1="270" x2="420" y2="420" stroke-dasharray="5 6"/>
  </g>

  <!-- 流动粒子（线上的小亮点） -->
  <g fill="#FAF1B8">
    <circle cx="180" cy="180" r="3"/>
    <circle cx="360" cy="180" r="3"/>
    <circle cx="180" cy="360" r="3"/>
    <circle cx="360" cy="360" r="3"/>
  </g>

  <!-- 数据库节点（4 个圆柱体） -->
  <g filter="url(#softShadow)">
    <!-- 左上 -->
    <g transform="translate(60 60)">
      <path d="M6 14 L6 78 A54 14 0 0 0 114 78 L114 14" fill="url(#gBody)"/>
      <ellipse cx="60" cy="14" rx="54" ry="14" fill="url(#gTop)" stroke="#C9A100" stroke-width="1.5"/>
      <ellipse cx="60" cy="40" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
      <ellipse cx="60" cy="60" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- 右上 -->
    <g transform="translate(360 60)">
      <path d="M6 14 L6 78 A54 14 0 0 0 114 78 L114 14" fill="url(#gBody)"/>
      <ellipse cx="60" cy="14" rx="54" ry="14" fill="url(#gTop)" stroke="#C9A100" stroke-width="1.5"/>
      <ellipse cx="60" cy="40" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
      <ellipse cx="60" cy="60" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- 左下 -->
    <g transform="translate(60 360)">
      <path d="M6 14 L6 78 A54 14 0 0 0 114 78 L114 14" fill="url(#gBody)"/>
      <ellipse cx="60" cy="14" rx="54" ry="14" fill="url(#gTop)" stroke="#C9A100" stroke-width="1.5"/>
      <ellipse cx="60" cy="40" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
      <ellipse cx="60" cy="60" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- 右下 -->
    <g transform="translate(360 360)">
      <path d="M6 14 L6 78 A54 14 0 0 0 114 78 L114 14" fill="url(#gBody)"/>
      <ellipse cx="60" cy="14" rx="54" ry="14" fill="url(#gTop)" stroke="#C9A100" stroke-width="1.5"/>
      <ellipse cx="60" cy="40" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
      <ellipse cx="60" cy="60" rx="54" ry="14" fill="none" stroke="#C9A100" stroke-width="1" opacity="0.5"/>
    </g>
  </g>

  <!-- 中心控制台徽章（仪表盘风格） -->
  <g filter="url(#softShadow)" transform="translate(210 210)">
    <!-- 外框 -->
    <rect width="120" height="120" rx="20" fill="url(#gCenter)" stroke="#A88500" stroke-width="2"/>
    <rect x="6" y="6" width="108" height="108" rx="15" fill="none" stroke="#FDF9E6" stroke-width="1" opacity="0.55"/>
    <!-- 内屏背景 -->
    <rect x="20" y="22" width="80" height="58" rx="6" fill="#1a1500" opacity="0.85"/>
    <!-- 柱状图 -->
    <rect x="28"  y="60" width="9" height="14" rx="1.5" fill="#FAF1B8"/>
    <rect x="41"  y="50" width="9" height="24" rx="1.5" fill="#F4E388"/>
    <rect x="54"  y="42" width="9" height="32" rx="1.5" fill="#ECCF57"/>
    <rect x="67"  y="54" width="9" height="20" rx="1.5" fill="#F4E388"/>
    <rect x="80"  y="46" width="9" height="28" rx="1.5" fill="#FAF1B8"/>
    <!-- 折线 -->
    <polyline points="28,38 41,32 54,28 67,34 80,30 92,33"
              fill="none" stroke="#FDF9E6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="92" cy="33" r="2.2" fill="#FDF9E6"/>
    <!-- 底部状态条 -->
    <g transform="translate(20 90)">
      <circle cx="6" cy="6" r="3.5" fill="#A88500"/>
      <rect x="15" y="2"  width="34" height="3" rx="1.5" fill="#A88500" opacity="0.85"/>
      <rect x="15" y="8"  width="22" height="3" rx="1.5" fill="#A88500" opacity="0.55"/>
      <rect x="56" y="2"  width="24" height="9" rx="2"   fill="#634D00"/>
      <text x="68" y="9" text-anchor="middle"
            font-family="-apple-system,Segoe UI,sans-serif"
            font-size="6" font-weight="700" fill="#FAF1B8" letter-spacing="0.5">LIVE</text>
    </g>
  </g>
</svg>
